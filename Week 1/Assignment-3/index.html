<!--Assignment-1 Movie Page-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 200px);
      gap: 30px;
    }

    .card {
      text-align: center;
    }

    .card img {
      width: 200px;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .card h3 {
      margin: 10px 0 4px;
      font-size: 15px;
    }

    .card p {
      margin: 0 0 8px;
      font-size: 13px;
      color: #333;
    }

    .card button {
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
    }

    .card button:hover {
      background-color: #1558b0;
    }
  </style>
</head>
<body>

  <div class="grid">

    <div class="card">
      <img src="media/spiderman brand new day wallpaper for phone.jpg" alt="Spiderman brand new day">
      <h3>Spiderman brand new day</h3>
      <p>IMDB Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="media/SPIDER-MAN_ NO WAY HOME (2021).jpg" alt="SPIDER-MAN: NO WAY HOME">
      <h3>SPIDER-MAN: NO WAY HOME</h3>
      <p>IMDB Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="media/The Amazing Spider-Man DVD.jpg" alt="The Amazing Spider-Man">
      <h3>The Amazing Spider-Man</h3>
      <p>IMDB Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="media/340584790598269034.jpg" alt="The Amazing Spider-Man-2">
      <h3>The Amazing Spider-Man-2</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="media/Spider-Man 3 Marvel Studios  The Greatest Battel Lies Within  May_2007.jpg" alt="Spider-Man 3">
      <h3>Spider-Man 3</h3>
      <p>IMDB Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="media/spider-man 2.jpg" alt="Spider-Man 2">
      <h3>Spider-Man 2</h3>
      <p>IMDB Rating: 4.5</p>
      <button>Book now</button>
    </div>

  </div>

</body>
</html>
