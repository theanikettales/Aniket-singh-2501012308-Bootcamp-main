<!doctype html>
<html>
  <head>
    <style>
      /* Element Selector */

      h2 {
        color: red;
      }

      /* Class Selector */

      .text {
        color: blue;
      }

      /* ID Selector */

      #heading {
        background: yellow;
      }

      /* Universal Selector */

      * {
        font-family: Arial;
      }
    </style>
  </head>

  <body>
    <h2 id="heading">CSS Selectors</h2>

    <p class="text">This uses class selector.</p>

    <p>This paragraph uses element selector.</p>
  </body>
</html>
