<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CT Calculator Task</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }

    h2 {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #222;
    }

    .keyboard {
      background: #dde1ea;
      border-radius: 14px;
      padding: 16px 18px;
      display: inline-flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .row {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .key {
      background: linear-gradient(to bottom, #f4f5f8, #dde0e8);
      border: 1px solid #b0b5c0;
      border-radius: 6px;
      box-shadow: 0 3px 0 #aaa, 0 4px 6px rgba(0,0,0,0.15);
      min-width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #334;
      cursor: pointer;
      user-select: none;
      padding: 0 6px;
    }

    .key:active {
      box-shadow: 0 1px 0 #aaa;
      transform: translateY(2px);
    }

    .key.wide   { min-width: 70px; }
    .key.wider  { min-width: 90px; }
    .key.widest { min-width: 240px; }
    .key.bold   { font-weight: bold; color: #223; }
  </style>
</head>
<body>

  <h2>CT Calculator Task</h2>

  <div class="keyboard">

    <!-- Row 1 -->
    <div class="row">
      <div class="key">~</div>
      <div class="key">1</div>
      <div class="key">2</div>
      <div class="key">3</div>
      <div class="key">4</div>
      <div class="key">5</div>
      <div class="key">6</div>
      <div class="key">7</div>
      <div class="key">8</div>
      <div class="key">9</div>
      <div class="key">0</div>
      <div class="key wide">Delete</div>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <div class="key wide">tab</div>
      <div class="key">Q</div>
      <div class="key">W</div>
      <div class="key">E</div>
      <div class="key">R</div>
      <div class="key">T</div>
      <div class="key">Y</div>
      <div class="key">U</div>
      <div class="key">I</div>
      <div class="key">O</div>
      <div class="key">P</div>
      <div class="key">\</div>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <div class="key wide">Caps</div>
      <div class="key">A</div>
      <div class="key">S</div>
      <div class="key">D</div>
      <div class="key">F</div>
      <div class="key">G</div>
      <div class="key bold">H</div>
      <div class="key">J</div>
      <div class="key">K</div>
      <div class="key">L</div>
      <div class="key wider bold">Enter</div>
    </div>

    <!-- Row 4 -->
    <div class="row">
      <div class="key wider">Shift</div>
      <div class="key">Z</div>
      <div class="key">X</div>
      <div class="key">C</div>
      <div class="key">V</div>
      <div class="key">B</div>
      <div class="key">N</div>
      <div class="key">M</div>
      <div class="key">&lt;</div>
      <div class="key">&gt;</div>
      <div class="key wider bold">Shift</div>
    </div>

    <!-- Row 5 -->
    <div class="row">
      <div class="key wide">Windows</div>
      <div class="key">ctrl</div>
      <div class="key wide">Options</div>
      <div class="key">Alt</div>
      <div class="key widest">Space</div>
      <div class="key">alt</div>
      <div class="key wide">Option</div>
      <div class="key">&lt;</div>
      <div class="key">&gt;</div>
    </div>

  </div>

</body>
</html>
