
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creating html,element via js</title>
</head>
<body>

    <div>
    
    </div>
    <!-- <h1 id="head">hello world</h1> -->
</body>
</html>

<script>
    //step-1 create element
    const h1 = document.createElement("h1");
    console.log(h1);

    //step-2 set/writevalue
    h1.innerText = "Hello World!";

    //step-3 set attribute
    h1.setAttribute("id", "head");

    //step-4 append h1 to body
    document.querySelector("body").append(h1);

    //step-5 style the element
    h1.style.color = "red";
</script>
