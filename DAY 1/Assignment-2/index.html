<!--Assignment-2 Registration form-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Event Registration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      font-size: 28px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="date"],
    input[type="time"] {
      border: 1px solid black;
      padding: 4px 6px;
    }

    input[type="number"] {
      width: 70px;
    }

    .checkboxes {
      margin-top: 16px;
    }

    .checkboxes p {
      margin-bottom: 6px;
    }

    .checkboxes label {
      display: inline;
      margin-left: 6px;
    }

    .checkbox-item {
      margin-bottom: 6px;
    }

    button {
      margin-top: 24px;
      padding: 8px 20px;
      font-size: 15px;
      border: 1px solid black;
      background-color: #f0f0f0;
      cursor: pointer;
    }

    button:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>

  <h1>College Event Registration &#128203;</h1>

  <label for="name">Your Name:</label>
  <input type="text" id="name" name="name">

  <label for="email">Email:</label>
  <input type="email" id="email" name="email">

  <label for="age">Age:</label>
  <input type="number" id="age" name="age">

  <div class="checkboxes">
    <p>Select Event Category:</p>
    <div class="checkbox-item">
      <input type="checkbox" id="coding" name="event" value="coding">
      <label for="coding">Coding Hackathon &#128250;</label>
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="debate" name="event" value="debate">
      <label for="debate">Debate Competition &#127908;</label>
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="sports" name="event" value="sports">
      <label for="sports">Sports Tournament &#9917;</label>
    </div>
  </div>

  <label for="date">Event Date:</label>
  <input type="date" id="date" name="date">

  <label for="time">Preferred Time Slot:</label>
  <input type="time" id="time" name="time">

  <br>
  <button type="submit">Register Now</button>

</body>
</html>
