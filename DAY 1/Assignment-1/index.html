<!--Assignment-1 HTML Table-weekly schedule-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        h2 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            margin: 0 auto;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px 14px;
            text-align: left;
            #D6E1E5
        }

        th {
            font-weight: bold;
            text-align: center;
            background-color: #54798B;
        }
    </style>
</head>

<body>

    <h2>Weekly Schedule</h2>

    <table>
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>
        <tr>
            <td rowspan="2">Morning</td>
            <td>Math</td>
            <td rowspan="2">Science Lab</td>
            <td></td>
            <td>History</td>
            <td>English</td>
        </tr>
        <tr>
            <td>Physics</td>
            <td></td>
            <td>Geography</td>
            <td>Sports</td>
        </tr>
        <tr>
            <td>Afternoon</td>
            <td colspan="5">Lunch Break</td>
        </tr>
        <tr>
            <td>Evening</td>
            <td>Computer Science</td>
            <td>Art</td>
            <td rowspan="2">Music</td>
            <td>Drama</td>
            <td>Free Period</td>
        </tr>
        <tr>
            <td>Late Evening</td>
            <td>Self Study</td>
            <td></td>
            <td>Debate</td>
            <td>Sports</td>
        </tr>
    </table>

</body>

</html>
